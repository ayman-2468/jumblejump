<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JumbleJump - تعلم الإنجليزية بطريقة ممتعة</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Cairo:wght@600;800&family=Fredoka:wght@600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="icon" href="assets/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/game.css" />
  <link rel="stylesheet" href="css/auth.css" />

  <!-- Libraries (CDN - No download needed) -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00695c">
</head>
<body class="game-body">
  <div class="game-container" id="basicGame">
    <div class="progress-container">سؤال <span id="questionCounter">1</span> من 100 | نجوم: <span id="starsEarned">0</span></div>
    <h1>المستوى الأساسي</h1>
    <p class="instruction">اسحب الكلمة إلى مكانها الصحيح!</p>
    <div class="categories-grid" id="categoriesGrid"></div>
    <div class="word-bank"><div class="words-list" id="wordsList"></div></div>
    <div class="hint-area" id="hintArea" style="display:none">تلميح: <span id="hintText"></span></div>
    <button id="checkBtn" class="btn-check">تحقق</button>

    <button class="help-btn" onclick="alert('اسحب الكلمات إلى الصندوق الصحيح\nلديك محاولتين فقط!')">؟</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase/config.js"></script>
  <script src="js/game/basicLevel.js"></script>
<!-- Firebase (Latest) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Your Firebase Config (SAFE) -->
<script src="js/firebase/config.js"></script>

<!-- Service Worker (PWA Offline) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</body>
</html>
