<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JumbleJump - تعلم الإنجليزية بطريقة ممتعة</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Cairo:wght@600;800&family=Fredoka:wght@600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="icon" href="assets/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/game.css" />
  <link rel="stylesheet" href="css/auth.css" />

  <!-- Libraries (CDN - No download needed) -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00695c">
</head>
<script src="js/admin/dashboard.js"></script>
<script src="js/admin/excelParser.js"></script>
<script src="js/admin/noCodeEditor.js"></script>
<body>
  <div class="admin-container">
    <h1>مرحباً يا بطل التعليم!</h1>
    <button id="logoutBtn">تسجيل الخروج</button>

    <!-- Excel Upload -->
    <div class="card">
      <h2>رفع ملف إكسل</h2>
      <input type="file" id="basicExcel" accept=".xlsx" /><br><br>
      <button class="btn-upload" data-type="basic">رفع المستوى الأساسي</button><br><br>
      <input type="file" id="sentencesExcel" accept=".xlsx" /><br><br>
      <button class="btn-upload" data-type="sentences">رفع الجمل</button>
      <button id="deleteAllBtn" style="background:red;margin-top:20px">حذف كل البيانات</button>
    </div>

    <!-- No-Code Editor -->
    <div class="card">
      <h2>تحكم كامل بدون برمجة</h2>
      <label>عدد الجمل في كل مستوى</label>
      <input type="number" id="sentencesPerLevel" value="100"><br><br>
      <label>عدد المحاولات</label>
      <select id="maxTrials"><option value="2">2</option><option value="3">3</option></select><br><br>
      <label>لون التطبيق</label>
      <input type="color" id="colorPrimary" value="#00695c"><br><br>
      <button onclick="saveAllSettings()">حفظ كل التغييرات</button>
    </div>

    <!-- Students List -->
    <div class="card">
      <h2>طلابك</h2>
      <table id="studentsTable"><tbody></tbody></table>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/libs/sheetjs.min.js"></script>
  <script src="js/firebase/config.js"></script>
  <script src="js/admin/noCodeEditor.js"></script>
<!-- Firebase (Latest) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Your Firebase Config (SAFE) -->
<script src="js/firebase/config.js"></script>

<!-- Service Worker (PWA Offline) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</body>
</html>
