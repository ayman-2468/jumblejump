<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JumbleJump Full App</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{font-family:'Nunito';margin:0;background:#f4fbfa}
.topbar{background:#009688;color:white;padding:15px;display:flex;justify-content:space-between}
.section{padding:20px}
.hidden{display:none}
.card{background:white;padding:20px;border-radius:20px;margin:10px 0;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
.level{cursor:pointer;padding:15px;border-radius:15px;background:#fff;margin:10px 0}
.locked{opacity:0.5;pointer-events:none}
.word{background:#ffb74d;padding:10px;border-radius:20px;margin:5px;display:inline-block}
button{padding:10px 20px;border:none;background:#009688;color:white;border-radius:10px;cursor:pointer}
canvas{max-width:100%}
</style>
</head>

<body>

<div class="topbar">
<h2>JumbleJump</h2>
<div>⭐ <span id="stars">0</span></div>
</div>

<!-- STUDENT DASHBOARD -->
<div id="student" class="section">
<h3>Levels</h3>
<div class="level" onclick="startLevel('beginner')">Beginner</div>
<div class="level locked">Intermediate 🔒</div>
<div class="level locked">Advanced 🔒</div>

<button onclick="openAdmin()">Admin</button>
</div>

<!-- GAME -->
<div id="game" class="section hidden">
<div class="card">
<h3>Arrange sentence</h3>
<div id="words"></div>
<button onclick="checkAnswer()">Check</button>
<p id="feedback"></p>
</div>
<button onclick="back()">Back</button>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin" class="section hidden">
<h2>Teacher Dashboard</h2>

<div class="card">
<h3>Stats</h3>
<p>Total Students: <span id="totalStudents">0</span></p>
<p>Total Attempts: <span id="totalAttempts">0</span></p>
</div>

<div class="card">
<h3>Progress Chart</h3>
<canvas id="progressChart"></canvas>
</div>

<div class="card">
<h3>Class Tracking</h3>
<ul id="studentList"></ul>
</div>

<button onclick="backToStudent()">Back</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC_AZYYrRo4Du87ohOhjK8Ke_UM8nq5Mdk",
authDomain: "jumblejump-prod.firebaseapp.com",
projectId: "jumblejump-prod"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;

// GLOBAL STATE
let sentences = [
{correct:"I am a student"},
{correct:"She is happy"}
];
let current = 0;

window.startLevel = function(level){
document.getElementById('student').classList.add('hidden');
document.getElementById('game').classList.remove('hidden');
loadSentence();
}

function shuffle(str){
return str.split(' ').sort(()=>Math.random()-0.5);
}

function loadSentence(){
let words = shuffle(sentences[current].correct);
let container = document.getElementById('words');
container.innerHTML='';
words.forEach(w=>{
let div=document.createElement('div');
div.className='word';
div.innerText=w;
container.appendChild(div);
});
new Sortable(container);
}

window.checkAnswer = async function(){
let result=[...document.getElementById('words').children].map(e=>e.innerText).join(' ');
if(result===sentences[current].correct){
confetti();
document.getElementById('feedback').innerText='Correct!';
await addDoc(collection(db,'attempts'),{correct:true});
current++;
if(current<sentences.length) loadSentence();
}
}

window.back = function(){
document.getElementById('game').classList.add('hidden');
document.getElementById('student').classList.remove('hidden');
}

// ADMIN
window.openAdmin = async function(){
document.getElementById('student').classList.add('hidden');
document.getElementById('admin').classList.remove('hidden');
loadAdmin();
}

window.backToStudent = function(){
document.getElementById('admin').classList.add('hidden');
document.getElementById('student').classList.remove('hidden');
}

async function loadAdmin(){
const attempts = await getDocs(collection(db,'attempts'));
const users = await getDocs(collection(db,'users'));

document.getElementById('totalStudents').innerText = users.size;
document.getElementById('totalAttempts').innerText = attempts.size;

let correct = 0;
attempts.forEach(doc=>{ if(doc.data().correct) correct++; });

new Chart(document.getElementById('progressChart'),{
type:'bar',
data:{
labels:['Correct','Wrong'],
datasets:[{data:[correct, attempts.size-correct]}]
}
});

let list = document.getElementById('studentList');
list.innerHTML='';
users.forEach(doc=>{
let li=document.createElement('li');
li.innerText=doc.id;
list.appendChild(li);
});
}

</script>

</body>
</html>
