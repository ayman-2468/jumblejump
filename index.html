<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JumbleJump Enhanced</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 p-6 font-sans">

<h1 class="text-2xl font-bold mb-4">JumbleJump Admin + Game</h1>

<!-- AUTH -->
<div class="bg-white p-4 rounded-xl mb-4">
<input id="email" placeholder="Email" class="border p-2 mr-2">
<input id="password" type="password" placeholder="Password" class="border p-2 mr-2">
<input id="code" placeholder="Teacher Code (optional)" class="border p-2 mr-2">
<button onclick="signup()" class="bg-teal-500 text-white px-4 py-2 rounded">Sign Up</button>
<button onclick="login()" class="bg-blue-500 text-white px-4 py-2 rounded">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin" class="hidden bg-white p-4 rounded-xl mb-4">
<h2 class="font-bold mb-2">Admin Dashboard</h2>

<button onclick="generateCode()" class="bg-purple-500 text-white px-3 py-2 rounded mb-2">Generate Teacher Code</button>
<p id="teacherCode"></p>

<input id="basicFile" type="file" class="mb-2">
<button onclick="uploadExcel('Basic')" class="bg-green-500 text-white px-3 py-2 rounded">Upload Basic</button>

<input id="otherFile" type="file" class="mb-2">
<button onclick="uploadExcel('Beginner')" class="bg-green-500 text-white px-3 py-2 rounded">Upload Other Levels</button>

<div class="mt-4">
<label>Basic Target</label>
<input id="basicTarget" type="number" value="5" class="border p-1">

<label>Trials</label>
<input id="trials" type="number" value="3" class="border p-1">

<button onclick="saveSettings()" class="bg-orange-500 text-white px-3 py-2 rounded">Save Settings</button>
</div>
</div>

<!-- GAME -->
<div id="game" class="hidden bg-white p-4 rounded-xl">
<h2 class="font-bold mb-2">Game</h2>
<p id="sentence"></p>
<input id="answer" class="border p-2">
<button onclick="checkAnswer()" class="bg-teal-500 text-white px-3 py-2 rounded">Check</button>
<button onclick="nextSentence()" class="bg-orange-500 text-white px-3 py-2 rounded">Next</button>
</div>

<script>

// Firebase config
const firebaseConfig = {
 apiKey: "YOUR_KEY",
 authDomain: "YOUR_DOMAIN",
 projectId: "YOUR_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let teacherSettings = { masteryTries: 3 };
let currentSentence = "";
let correctCount = 0;

// Sounds
const sounds = {
 correct: new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"),
 wrong: new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg")
};

function generateTeacherCode(){
 const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
 let code="JJ-";
 for(let i=0;i<6;i++) code+=chars[Math.floor(Math.random()*chars.length)];
 return code;
}

async function signup(){
 const email=document.getElementById('email').value;
 const password=document.getElementById('password').value;
 const code=document.getElementById('code').value;

 const user=await firebase.auth().createUserWithEmailAndPassword(email,password);

 const teacherQuery=await db.collection('teachers').where('code','==',code).get();

 if(!teacherQuery.empty){
  const teacher=teacherQuery.docs[0];
  await db.collection('students').doc(user.user.uid).set({
   email,
   teacherId:teacher.id,
   progress:0
  });
 }else{
  const newCode=generateTeacherCode();
  await db.collection('teachers').doc(user.user.uid).set({
   email,
   code:newCode,
   settings:{basicTarget:5, masteryTries:3}
  });
 }
}

async function login(){
 const email=document.getElementById('email').value;
 const password=document.getElementById('password').value;

 const user=await firebase.auth().signInWithEmailAndPassword(email,password);

 const teacherDoc=await db.collection('teachers').doc(user.user.uid).get();

 if(teacherDoc.exists){
  document.getElementById('admin').classList.remove('hidden');
  teacherSettings=teacherDoc.data().settings;
 }else{
  document.getElementById('game').classList.remove('hidden');
 }
}

async function generateCode(){
 const user=firebase.auth().currentUser;
 const code=generateTeacherCode();
 await db.collection('teachers').doc(user.uid).update({code});
 document.getElementById('teacherCode').innerText=code;
}

async function saveSettings(){
 const user=firebase.auth().currentUser;
 const basicTarget=document.getElementById('basicTarget').value;
 const trials=document.getElementById('trials').value;

 await db.collection('teachers').doc(user.uid).update({
  settings:{basicTarget:Number(basicTarget), masteryTries:Number(trials)}
 });
 alert('Saved');
}

async function uploadExcel(level){
 const file=document.getElementById(level==='Basic'?'basicFile':'otherFile').files[0];
 const data=await file.arrayBuffer();
 const workbook=XLSX.read(data);
 const sheet=workbook.Sheets[workbook.SheetNames[0]];
 const json=XLSX.utils.sheet_to_json(sheet);

 const user=firebase.auth().currentUser;

 await db.collection('sentences').doc(user.uid+'_'+level).set({
  level,
  data:json
 });
 alert('Uploaded');
}

async function loadSentence(){
 const user=firebase.auth().currentUser;
 const student=await db.collection('students').doc(user.uid).get();
 const teacherId=student.data().teacherId;

 const doc=await db.collection('sentences').doc(teacherId+'_Beginner').get();
 const list=doc.data().data;
 currentSentence=list[Math.floor(Math.random()*list.length)].Correct_Sentence;
 document.getElementById('sentence').innerText=currentSentence.split(' ').sort(()=>0.5-Math.random()).join(' ');
}

function checkAnswer(){
 const ans=document.getElementById('answer').value;
 if(ans===currentSentence){
  correctCount++;
  sounds.correct.play();
  if(correctCount>=teacherSettings.masteryTries){
   alert('Next unlocked');
  }
 }else{
  sounds.wrong.play();
 }
}

function nextSentence(){
 correctCount=0;
 loadSentence();
}

</script>

</body>
</html>
