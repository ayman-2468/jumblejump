<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JumbleJump | Gamified English Learning</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>

    <style>
        :root {
            --teal: #0d9488;
            --orange: #f97316;
            --white: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0fdfa; }
        .bg-teal { background-color: var(--teal); }
        .text-teal { color: var(--teal); }
        .bg-orange { background-color: var(--orange); }
        .text-orange { color: var(--orange); }
    </style>
</head>
<body class="min-h-screen">

    <div id="app" class="container mx-auto p-4">
        <!-- Auth View -->
        <section id="auth-view" class="max-w-md mx-auto mt-20 p-8 bg-white rounded-2xl shadow-xl">
            <h1 class="text-3xl font-bold text-teal text-center mb-6">JumbleJump</h1>
            <input type="email" id="email" placeholder="Email" class="w-full p-3 mb-4 border rounded-lg">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 mb-4 border rounded-lg">
            <button id="login-btn" class="w-full bg-teal text-white p-3 rounded-lg font-bold">Login</button>
        </section>

        <!-- Dashboard View (Hidden by default) -->
        <section id="dashboard-view" class="hidden">
            <nav class="flex justify-between items-center p-4 bg-white rounded-xl shadow mb-6">
                <h2 class="text-xl font-bold text-teal">JumbleJump Dashboard</h2>
                <button id="logout-btn" class="text-sm text-gray-500">Logout</button>
            </nav>
            <div id="game-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Game components will be injected here -->
            </div>
        </section>
    </div>

    <script>
        // --- Firebase Config & Initialization ---
        const firebaseConfig = {
            // REPLACE WITH YOUR FIREBASE CONFIG
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- Modules Placeholder ---
        console.log("JumbleJump Initialized");
    </script>
</body>
</html>
