<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JumbleJump - تعلم الإنجليزية بطريقة ممتعة</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Cairo:wght@600;800&family=Fredoka:wght@600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="icon" href="assets/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/game.css" />
  <link rel="stylesheet" href="css/auth.css" />

  <!-- Libraries (CDN - No download needed) -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00695c">
</head>
<body style="text-align:center;padding:50px;background:#00695c;color:white;">
  <h1>جمبل جمب</h1>
  <input type="email" id="email" placeholder="البريد الإلكتروني" style="padding:15px;margin:10px;width:300px;border-radius:50px;border:none;"><br>
  <input type="password" id="pass" placeholder="كلمة المرور" style="padding:15px;margin:10px;width:300px;border-radius:50px;border:none;"><br>
  <button onclick="login()" style="padding:15px 40px;margin:20px;background:#ff6f00;color:white;border:none;border-radius:50px;font-size:18px;">دخول</button>
  <p>أول مرة؟ <a href="#" onclick="signup()" style="color:#fff700">إنشاء حساب</a></p>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="js/firebase/config.js"></script>
  <script>
    function login() {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('pass').value;
      auth.signInWithEmailAndPassword(email, pass).then(() => location.href = 'index.html');
    }
    function signup() {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('pass').value;
      auth.createUserWithEmailAndPassword(email, pass).then(() => location.href = 'index.html');
    }
  </script>
<!-- Firebase (Latest) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Your Firebase Config (SAFE) -->
<script src="js/firebase/config.js"></script>

<!-- Service Worker (PWA Offline) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</body>
</html>
