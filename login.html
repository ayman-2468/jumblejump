<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>جمبل جمب | تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Fredoka:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00695c">
</head>
<body class="auth-body">

<div class="auth-container">
  <div class="auth-card">
    <div class="logo">
      <h1>جمبل جمب</h1>
      <p>تعلم الإنجليزية بطريقة ممتعة</p>
    </div>

    <div class="toggle-tabs">
      <button class="tab-active" id="loginTab">تسجيل الدخول</button>
      <button id="signupTab">إنشاء حساب</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required />
      <div class="password-wrapper">
        <input type="password" id="loginPassword" placeholder="كلمة المرور" required />
        <span class="toggle-pass" onclick="togglePass('loginPassword')">إظهار</span>
      </div>
      <button type="submit" class="btn-primary">دخول</button>
    </form>

    <!-- Sign Up Form -->
    <form id="signupForm" style="display:none">
      <input type="text" id="displayName" placeholder="اسمك الكامل (مثل: أحمد محمد)" required />
      <input type="email" id="signupEmail" placeholder="البريد الإلكتروني" required />
      <div class="password-wrapper">
        <input type="password" id="signupPassword" placeholder="كلمة مرور (6 أحرف على الأقل)" required minlength="6" />
        <span class="toggle-pass" onclick="togglePass('signupPassword')">إظهار</span>
      </div>
      <button type="submit" class="btn-primary">إنشاء حساب جديد</button>
    </form>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase/config.js"></script>

<script>
// تبديل بين تسجيل الدخول والتسجيل
document.getElementById('loginTab').onclick = () => { document.getElementById('loginForm').style.display = 'block'; document.getElementById('signupForm').style.display = 'none'; document.getElementById('loginTab').classList.add('tab-active'); document.getElementById('signupTab').classList.remove('tab-active'); };
document.getElementById('signupTab').onclick = () => { document.getElementById('signupForm').style.display = 'block'; document.getElementById('loginForm').style.display = 'none'; document.getElementById('signupTab').classList.add('tab-active'); document.getElementById('loginTab').classList.remove('tab-active'); };

// إظهار/إخفاء كلمة المرور
function togglePass(id) {
  const x = document.getElementById(id);
  const btn = x.nextElementSibling;
  if (x.type === "password") { x.type = "text"; btn.textContent = "إخفاء"; } 
  else { x.type = "password"; btn.textContent = "إظهار"; }
}

// تسجيل الدخول
document.getElementById('loginForm').onsubmit = e => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPassword').value;
  auth.signInWithEmailAndPassword(email, pass)
    .then(() => location.href = 'index.html')
    .catch(err => alert("البريد أو كلمة المرور خطأ"));
};

// إنشاء حساب
document.getElementById('signupForm').onsubmit = e => {
  e.preventDefault();
  const name = document.getElementById('displayName').value;
  const email = document.getElementById('signupEmail').value;
  const pass = document.getElementById('signupPassword').value;
  auth.createUserWithEmailAndPassword(email, pass)
    .then(cred => cred.user.updateProfile({ displayName: name }))
    .then(() => location.href = 'index.html')
    .catch(err => alert(err.message));
};
</script>
</body>
</html>
