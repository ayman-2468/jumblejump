<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JumbleJump - تعلم الإنجليزية بطريقة ممتعة</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Cairo:wght@600;800&family=Fredoka:wght@600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="icon" href="assets/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/game.css" />
  <link rel="stylesheet" href="css/auth.css" />

  <!-- Libraries (CDN - No download needed) -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00695c">
</head>
<body class="game-body">

<div class="game-container">
  <!-- Header -->
  <div class="game-header">
    <div class="level-info">
      <span>المستوى: <strong id="currentLevelName">المبتدئ</strong></span>
      <span id="questionCounter">1 / 100</span>
      <span id="starsEarned">نجوم 0</span>
      <span id="streakDisplay">سلسلة 0 أيام</span>
    </div>
    <div class="controls">
      <button id="soundToggle">الصوت</button>
      <button id="darkModeBtn">الوضع الليلي</button>
      <div class="lang-switch">
        <button id="langAr" class="lang-btn active">العربية</button>
        <button id="langEn" class="lang-btn">EN</button>
      </div>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="sentence-area">
    <h2 id="levelTitle">مستوى المبتدئ</h2>
    <p class="instruction" data-t="instruction">اسحب الكلمات لتكوين الجملة الصحيحة!</p>

    <div class="sentence-builder" id="sentenceBuilder"></div>

    <div class="hint-area" id="hintArea" style="display:none">
      <p><strong>تلميح:</strong> <span id="hintText"></span></p>
      <p>المحاولات المتبقية: <span id="trialsLeft">2</span></p>
    </div>

    <button id="checkBtn" class="btn-check" data-t="check">تحقق من الإجابة</button>
  </div>

  <!-- Success -->
  <div class="success-overlay" id="successOverlay" style="display:none">
    <div class="success-card">
      <h2>ممتاز يا بطل!</h2>
      <p class="grammar-spotlight" id="grammarSpotlight"></p>
      <blockquote id="motivationalQuote">احسنت! استمر هكذا</blockquote>
      <button id="nextBtn" class="btn-next" data-t="next">التالي →</button>
    </div>
  </div>

  <!-- Help Button -->
  <button class="help-btn" onclick="showHelp()">؟</button>

  <div id="helpModal" class="modal" style="display:none">
    <div class="modal-content">
      <h3>كيف تلعب؟</h3>
      <p>اسحب الكلمات لوضعها بالترتيب الصحيح</p>
      <p>لديك محاولتين لكل جملة</p>
      <p>كل إجابة صحيحة = نجمة واحدة</p>
      <p>كل 10 نجوم = ميدالية ذهبية</p>
      <button onclick="document.getElementById('helpModal').style.display='none'">حسنًا!</button>
    </div>
  </div>
</div>

<!-- Sounds -->
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-reward-952.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-918.mp3"></audio>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Config & Logic -->
<script src="/js/firebase/config.js"></script>
<script src="/js/lang.js"></script>
<script src="/js/game/sentences.js"></script>

<script>
// Help & Sound Toggle
function showHelp() {
  document.getElementById('helpModal').style.display = 'flex';
}

let soundEnabled = true;
document.getElementById('soundToggle').onclick = () => {
  soundEnabled = !soundEnabled;
  document.getElementById('soundToggle').textContent = soundEnabled ? 'الصوت' : 'بلا صوت';
};

// Dark Mode
document.getElementById('darkModeBtn').onclick = () => {
  document.body.classList.toggle('dark-mode');
  localStorage.setItem('dark', document.body.classList.contains('dark-mode'));
};
if (localStorage.getItem('dark') === 'true') document.body.classList.add('dark-mode');
</script>
<!-- Firebase (Latest) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Your Firebase Config (SAFE) -->
<script src="js/firebase/config.js"></script>

<!-- Service Worker (PWA Offline) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</body>
</html>
